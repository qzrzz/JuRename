appId: com.qzrzz.jurename
productName: JuRename
asar: true
concurrency:
  jobs: 2
directories:
  output: release
  buildResources: assets
files:
  - dist-electron/**
  - package.json
extraResources:
  - from: assets/icon.png
    to: icon.png
mac:
  artifactName: ${productName}-${version}-${arch}-mac.${ext}
  target:
    - zip
win:
  target:
    - zip
linux:
  category: Utility
  syncDesktopName: true
  target:
    - AppImage
