name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  version:
    name: Verify release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - id: package
        name: Read package version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${version}." >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.name }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-13
          - name: Windows
            os: windows-latest
          - name: Linux
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create distributables
        run: bun run make

      - name: Upload distributables
        uses: actions/upload-artifact@v4
        with:
          name: jurename-${{ matrix.name }}-${{ needs.version.outputs.version }}
          path: out/make/**
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download distributables
        uses: actions/download-artifact@v4
        with:
          pattern: jurename-*
          merge-multiple: true
          path: release-assets

      - name: Create release and upload files
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find release-assets -type f -print0)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files were found." >&2
            exit 1
          fi

          gh release create "v${VERSION}" "${files[@]}" \
            --title "JuRename v${VERSION}" \
            --generate-notes
